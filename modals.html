<div class="modal-bg" id="courseDlMod">
  <div class="modal">
    <button class="modal-x" onclick="closeMod('courseDlMod')">&times;</button>
    <h3 id="cdl-title">📄 Download Course Curriculum</h3>
    <p class="md">Enter your details below — we'll send the PDF on WhatsApp instantly.</p>
    <form onsubmit="handleCourseDl(event)">
      <div class="fg"><label>Full Name *</label><input id="cdl-name" required placeholder="Your full name"></div>
      <div class="fg"><label>Phone / WhatsApp *</label><input type="tel" id="cdl-phone" required placeholder="+91 XXXXX XXXXX"></div>
      <div class="fg"><label>Email *</label><input type="email" id="cdl-email" required placeholder="you@example.com"></div>
      <div class="fg"><label>Country *</label>
        <select id="cdl-country" required>
          <option value="">Select Country</option>
          <option>India</option><option>Australia</option><option>United States</option>
          <option>Canada</option><option>Singapore</option><option>Germany</option><option>Other</option>
        </select>
      </div>
      <input type="hidden" id="cdl-course-key" value="">
      <input type="hidden" id="cdl-course-name" value="">
      <button type="submit" class="form-btn" id="cdl-btn">📄 Send Curriculum on WhatsApp</button>
    </form>
  </div>
</div>

<!-- COURSE ENROLL MODAL -->
<div class="modal-bg" id="courseEnrollMod">
  <div class="modal">
    <button class="modal-x" onclick="closeMod('courseEnrollMod')">&times;</button>
    <h3 id="ce-title">🚀 Enroll Now</h3>
    <p class="md">Fill your details — our team will contact you within minutes on WhatsApp.</p>
    <form onsubmit="handleCourseEnroll(event)">
      <div class="fg"><label>Full Name *</label><input id="ce-name" required placeholder="Your full name"></div>
      <div class="fg"><label>Phone / WhatsApp *</label><input type="tel" id="ce-phone" required placeholder="+91 XXXXX XXXXX"></div>
      <div class="fg"><label>Email *</label><input type="email" id="ce-email" required placeholder="you@example.com"></div>
      <div class="fr">
        <div class="fg"><label>Country *</label>
          <select id="ce-country" required>
            <option value="">Select</option>
            <option>India</option><option>Australia</option><option>United States</option>
            <option>Canada</option><option>Singapore</option><option>Germany</option><option>Other</option>
          </select>
        </div>
        <div class="fg"><label>Background</label>
          <select id="ce-bg">
            <option value="">Select</option>
            <option>Student / Fresh Graduate</option><option>IT Professional</option>
            <option>Domain Change (Non-IT)</option><option>Onsite Professional</option>
          </select>
        </div>
      </div>
      <input type="hidden" id="ce-course-name" value="">
      <button type="submit" class="form-btn" id="ce-btn">🚀 Submit &amp; Connect on WhatsApp</button>
    </form>
  </div>
</div>
